name: Deploy Quest VR Creator to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for validation)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JavaScript Syntax (Error Reduction Hook)
        run: |
          echo "🧠 Extracting inline script for syntax validation to catch errors early and ensure deploy intelligence..."
          # Write inline script to temp file for --check (syntax only, no execution/runtime errors from missing DOM/AFRAME)
          node -e '
            const fs = require("fs");
            const html = fs.readFileSync("index.html", "utf8");
            const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/);
            if (scriptMatch && scriptMatch[1]) {
              const code = scriptMatch[1].trim();
              fs.writeFileSync("/tmp/vr-script.js", code);
              console.log("Script extracted, length:", code.length);
            } else {
              console.log("No script tag found");
              process.exit(0);
            }
          '
          # Now syntax check only - catches parse errors without running browser-specific code
          if node --check /tmp/vr-script.js; then
            echo "✅ JavaScript syntax validation PASSED - no syntax errors detected. Code is clean for Quest VR."
            echo "🧠 Intelligence Note: For even smarter development, integrate hooks from the quest-vr-creator skill (error-mitigation, spawn-intelligence, state-management, tablet-ui). These provide dynamic positioning, reactive UI, centralized state, and robust error handling — reducing future errors and amplifying capabilities."
            echo "🧠 Recommended: After changes, run full Local Development Workflow (Analyze with GitHub tools, Plan, Implement via precise edits, Test syntax+local+VR, Correct, Update skill/README)."
          else
            echo "❌ JavaScript syntax ERROR detected - failing build to prevent deploying broken code to Quest users."
            exit 1
          fi

      - name: Intelligence & Best Practices Guidance (Non-Blocking)
        run: |
          echo "🧠 Running optional intelligence scan for key VR Creator patterns (state, error hooks, spawn logic)..."
          if grep -q "VRCreatorState" index.html; then
            echo "✅ State management hook/pattern detected — good for intelligence and reactive features."
          else
            echo "💡 Opportunity: Add VRCreatorState or integrate state-management-hook.js for better tracking of spawns/tools."
          fi
          if grep -q "error" index.html && grep -q "addEventListener" index.html; then
            echo "✅ Error mitigation listener present — aligns with less-errors principle."
          fi
          if grep -q "spawn-object\|spawnIntelligentObject" index.html; then
            echo "✅ Spawn intelligence detected — dynamic placement active."
          fi
          echo "🧠 All guidance is advisory to help you (Grok) build with maximal intelligence and minimal errors. Hooks in skill/hooks/ are ready to merge for next-level UI/state/spawn."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
