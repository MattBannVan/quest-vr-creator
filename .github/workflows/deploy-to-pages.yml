name: Deploy Quest VR Creator to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for validation)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JavaScript Syntax (Error Reduction Hook)
        run: |
          echo "🧠 Extracting inline script for syntax validation to catch errors early and ensure deploy intelligence..."
          # Write inline script to temp file for --check (syntax only, no execution/runtime errors from missing DOM/AFRAME)
          node -e '
            const fs = require("fs");
            const html = fs.readFileSync("index.html", "utf8");
            const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/);
            if (scriptMatch && scriptMatch[1]) {
              const code = scriptMatch[1].trim();
              fs.writeFileSync("/tmp/vr-script.js", code);
              console.log("Script extracted, length:", code.length);
            } else {
              console.log("No script tag found");
              process.exit(0);
            }
          '
          # Now syntax check only - catches parse errors without running browser-specific code
          if node --check /tmp/vr-script.js; then
            echo "✅ JavaScript syntax validation PASSED - no syntax errors detected. Code is clean for Quest VR."
            echo "🧠 Intelligence Note: Hooks integrated (error-mitigation, spawn-intelligence, state-management, tablet-ui). Full modular intelligence active for dynamic spawning, reactive UI, error resilience."
            echo "🧠 Recommended: After changes, run full Local Development Workflow from quest-vr-creator skill (Analyze, Plan, Implement, Test syntax+local+VR, Correct, Update skill)."
          else
            echo "❌ JavaScript syntax ERROR detected - failing build to prevent deploying broken code to Quest users."
            exit 1
          fi

      - name: Validate Hooks JavaScript Syntax (Extended Intelligence & Error Prevention)
        run: |
          echo "🧠 Validating hooks/*.js files - these provide the core intelligence layer (state, spawn, UI, error mitigation). Ensuring zero syntax errors for robust VR experience."
          hooks_found=false
          for hook in hooks/*.js; do
            if [ -f "$hook" ]; then
              hooks_found=true
              echo "Checking $hook ..."
              if node --check "$hook"; then
                echo "✅ $hook syntax PASSED - intelligence module clean."
              else
                echo "❌ $hook syntax FAILED - blocking deploy to protect Quest users."
                exit 1
              fi
            fi
          done
          if [ "$hooks_found" = false ]; then
            echo "⚠️ No hooks/ directory found - consider adding for full intelligence (see skill/hooks/)."
          else
            echo "✅ All hooks validated successfully. Project now embodies modular, error-resistant, intelligent design."
          fi

      - name: Intelligence & Best Practices Guidance (Non-Blocking)
        run: |
          echo "🧠 Running optional intelligence scan for key VR Creator patterns (state, error hooks, spawn logic, tablet UI)..."
          if grep -q "VRCreatorState\|updateVRState" index.html || [ -f hooks/state-management-hook.js ]; then
            echo "✅ State management hook/pattern detected — good for intelligence and reactive features."
          else
            echo "💡 Opportunity: Integrate state-management-hook.js for better tracking of spawns/tools."
          fi
          if grep -q "safeExecute\|error-mitigation-hook" index.html || [ -f hooks/error-mitigation-hook.js ]; then
            echo "✅ Error mitigation listener/hook present — aligns with less-errors principle."
          fi
          if grep -q "spawn-button\|spawnIntelligentObject" index.html || [ -f hooks/spawn-intelligence-hook.js ]; then
            echo "✅ Spawn intelligence + spawn-button component detected — dynamic camera-aware placement active."
          fi
          if grep -q "initTabletUI\|tablet-ui-hook" index.html || [ -f hooks/tablet-ui-hook.js ]; then
            echo "✅ Tablet UI hook integrated — multi-tool reactive UI active."
          fi
          if [ -d hooks ]; then
            echo "✅ hooks/ directory present with modular intelligence files."
          fi
          echo "🧠 All guidance is advisory to help build with maximal intelligence and minimal errors. The quest-vr-creator skill + hooks + this workflow form a complete automation system for your vision."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
