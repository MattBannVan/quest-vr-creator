name: Deploy Quest VR Creator to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for validation)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JavaScript Syntax (Error Reduction Hook)
        run: |
          echo "Extracting script and running syntax validation to catch errors early..."
          # Write inline script to temp file for --check (syntax only, no execution/runtime errors from missing DOM/AFRAME)
          node -e '
            const fs = require("fs");
            const html = fs.readFileSync("index.html", "utf8");
            const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/);
            if (scriptMatch && scriptMatch[1]) {
              const code = scriptMatch[1].trim();
              fs.writeFileSync("/tmp/vr-script.js", code);
              console.log("Script extracted, length:", code.length);
            } else {
              console.log("No script tag found");
              process.exit(0);
            }
          '
          # Now syntax check only - catches parse errors without running browser-specific code
          if node --check /tmp/vr-script.js; then
            echo "✅ JavaScript syntax validation PASSED - no syntax errors detected"
          else
            echo "❌ JavaScript syntax ERROR detected - failing build to prevent deploying broken code"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
