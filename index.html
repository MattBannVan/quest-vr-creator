<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Quest VR Creator</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.1.0/dist/aframe-physics-system.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@4.2.1/dist/aframe-event-set-component.min.js"></script>
    <script src="https://unpkg.com/super-hands@3.0.6/dist/super-hands.min.js"></script>
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <a-scene physics="debug: false" environment="preset: default; groundTexture: none; groundColor: #333333;" xr-mode-ui="enabled: true" background="color: #111111">
      <!-- Lighting -->
      <a-entity light="type: ambient; color: #BBB"></a-entity>
      <a-entity light="type: directional; intensity: 0.8; castShadow: true" position="1 3 1"></a-entity>

      <!-- Ground -->
      <a-plane id="ground" static-body="shape: box" position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#555555" class="raycaster-target"></a-plane>

      <!-- Basic Environment Objects -->
      <a-box position="-5 1 -5" rotation="0 45 0" color="#4CC3D9" dynamic-body="shape: box" class="raycaster-target"></a-box>
      <a-sphere position="5 1 -5" radius="1" color="#EF2D5E" dynamic-body="shape: sphere" class="raycaster-target"></a-sphere>

      <!-- Player Rig -->
      <a-entity id="player" position="0 1.6 0">
        <a-camera></a-camera>
        
        <!-- Left Controller -->
        <a-entity id="left-hand" oculus-touch-controls="hand: left" super-hands raycaster="objects: .raycaster-target; interval: 0;" line="color: #00FF00; opacity: 0.5"></a-entity>
        
        <!-- Right Controller -->
        <a-entity id="right-hand" oculus-touch-controls="hand: right" super-hands raycaster="objects: .raycaster-target; interval: 0;" line="color: #FF0000; opacity: 0.5"></a-entity>
      </a-entity>

      <!-- 3D Tablet for UI -->
      <a-entity id="tablet" position="0 1.2 -1" rotation="0 0 0" geometry="primitive: plane; width: 0.8; height: 0.6" material="color: #222288; shader: flat" class="raycaster-target">
        <!-- UI elements will be added dynamically via JS -->
        <a-text id="tablet-title" value="Object Creator" position="0 0.2 0.01" align="center" color="#FFFFFF" width="0.7"></a-text>
        <a-entity id="create-cube" position="-0.2 0 0.01" geometry="primitive: box; width: 0.15; height: 0.15; depth: 0.05" material="color: #4CC3D9" event-set__click="_target: #player; spawn-object: type: cube"></a-entity>
        <!-- More buttons -->
      </a-entity>

      <!-- Sky -->
      <a-sky color="#112233"></a-sky>
    </a-scene>

    <script>
      // Custom component for spawning objects
      AFRAME.registerComponent('spawn-object', {
        schema: { type: {default: 'cube'} },
        init: function () {
          this.el.addEventListener('click', () => {
            const scene = document.querySelector('a-scene');
            const newObj = document.createElement('a-entity');
            
            if (this.data.type === 'cube') {
              newObj.setAttribute('geometry', 'primitive: box; width: 0.5; height: 0.5; depth: 0.5');
              newObj.setAttribute('material', 'color: #FFCC00');
              newObj.setAttribute('position', '0 1.5 -2');
              newObj.setAttribute('dynamic-body', 'shape: box');
              newObj.setAttribute('class', 'raycaster-target');
            }
            
            scene.appendChild(newObj);
            console.log('Spawned object');
          });
        }
      });

      // Joystick movement handling
      window.addEventListener('load', () => {
        console.log('Quest VR Creator loaded successfully. Tailored for Meta Quest 3.');
        // Additional dynamic UI and event setup can go here
      });
    </script>
  </body>
</html>
