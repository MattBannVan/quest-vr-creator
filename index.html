<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Quest VR Creator</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.1.0/dist/aframe-physics-system.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@4.2.1/dist/aframe-event-set-component.min.js"></script>
    <script src="https://unpkg.com/super-hands@3.0.6/dist/super-hands.min.js"></script>
    <!-- Intelligence Hooks: modular, error-resistant, stateful, dynamic UI & spawn logic for less errors + more intelligence -->
    <script src="hooks/error-mitigation-hook.js"></script>
    <script src="hooks/state-management-hook.js"></script>
    <script src="hooks/spawn-intelligence-hook.js"></script>
    <script src="hooks/tablet-ui-hook.js"></script>
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <a-scene physics="debug: false" environment="preset: default; groundTexture: none; groundColor: #333333;" xr-mode-ui="enabled: true" background="color: #111111">
      <!-- Lighting -->
      <a-entity light="type: ambient; color: #BBB"></a-entity>
      <a-entity light="type: directional; intensity: 0.8; castShadow: true" position="1 3 1"></a-entity>

      <!-- Ground -->
      <a-plane id="ground" static-body="shape: box" position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#555555" class="raycaster-target"></a-plane>

      <!-- Basic Environment Objects -->
      <a-box position="-5 1 -5" rotation="0 45 0" color="#4CC3D9" dynamic-body="shape: box" class="raycaster-target"></a-box>
      <a-sphere position="5 1 -5" radius="1" color="#EF2D5E" dynamic-body="shape: sphere" class="raycaster-target"></a-sphere>

      <!-- Player Rig -->
      <a-entity id="player" position="0 1.6 0">
        <a-camera id="camera"></a-camera>
        
        <!-- Left Controller -->
        <a-entity id="left-hand" oculus-touch-controls="hand: left" super-hands raycaster="objects: .raycaster-target; interval: 0;" line="color: #00FF00; opacity: 0.5"></a-entity>
        
        <!-- Right Controller -->
        <a-entity id="right-hand" oculus-touch-controls="hand: right" super-hands raycaster="objects: .raycaster-target; interval: 0;" line="color: #FF0000; opacity: 0.5"></a-entity>
      </a-entity>

      <!-- 3D Tablet for UI - buttons populated dynamically by tablet-ui-hook for multi-tool intelligence -->
      <a-entity id="tablet" position="0 1.2 -1" rotation="0 0 0" geometry="primitive: plane; width: 0.8; height: 0.6" material="color: #222288; shader: flat" class="raycaster-target">
        <!-- Title managed by hook; buttons added via initTabletUI() -->
        <a-text id="tablet-title" value="Object Creator" position="0 0.2 0.01" align="center" color="#FFFFFF" width="0.7"></a-text>
      </a-entity>

      <!-- Sky -->
      <a-sky color="#112233"></a-sky>
    </a-scene>

    <script>
      // Main initialization - hooks provide error mitigation, state, intelligent spawn, and reactive tablet UI
      // This replaces previous inline spawn-object and basic state for modular, extensible, tested intelligence
      window.addEventListener('load', () => {
        try {
          console.log('✅ Quest VR Creator loaded successfully with full Grok automations intelligence stack.');
          
          // Initialize the intelligent tablet UI: creates 3 tool buttons (C/S/Y), reactive stats, state listeners
          if (typeof window.initTabletUI === 'function') {
            window.initTabletUI();
          } else {
            console.warn('⚠️ initTabletUI not available - check hook loading order');
          }

          // Optional: set initial tool via state hook
          if (typeof window.selectTool === 'function') {
            window.selectTool('cube');
          }

          // Trigger initial state update for any listeners
          if (typeof window.updateVRState === 'function') {
            window.updateVRState({ lastInteraction: Date.now() });
          }

          console.log('🧠 All intelligence active: camera-aware spawning, centralized state+undo, error hooks, reactive multi-tool UI. Ready for Meta Quest 3 VR creation!');
        } catch (err) {
          console.error('Main Load Init Error (caught & mitigated by error hook):', err);
        }
      });
    </script>
  </body>
</html>
